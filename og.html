<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'Archivo';src:url('/assets/fonts/Archivo-300.woff2') format('woff2');font-weight:300;font-display:block}
@font-face{font-family:'Archivo';src:url('/assets/fonts/Archivo-900.woff2') format('woff2');font-weight:900;font-display:block}
@font-face{font-family:'Space Mono';src:url('/assets/fonts/SpaceMono-700.woff2') format('woff2');font-weight:700;font-display:block}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;color:#fff;font-family:'Archivo',sans-serif;
  background:linear-gradient(160deg,#0c1607 0%,#16260d 55%,#22350f 100%);position:relative}
.wave{position:absolute;border-radius:50%;pointer-events:none}
.w1{width:1500px;height:800px;left:-260px;top:-330px;transform:rotate(-9deg);border-bottom:3px solid rgba(200,230,76,.8);filter:blur(5px)}
.w2{width:1500px;height:860px;right:-420px;bottom:-480px;transform:rotate(-13deg);border-top:4px solid rgba(200,230,76,.55);filter:blur(9px)}
.glow{position:absolute;width:800px;height:560px;right:-160px;top:40px;border-radius:50%;background:radial-gradient(closest-side,rgba(200,230,76,.13),transparent 72%)}
.inner{position:relative;z-index:2;padding:76px 84px}
.brand{font-family:'Space Mono';font-weight:700;font-size:17px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px;color:rgba(255,255,255,.78)}
h1{font-weight:900;font-size:118px;line-height:.98;text-transform:uppercase;margin-bottom:34px}
h1 .lt{font-weight:300;letter-spacing:.045em}
.meta{display:inline-block;font-family:'Space Mono';font-weight:700;font-size:19px;letter-spacing:.05em;text-transform:uppercase;background:#c8e64c;color:#14230d;padding:13px 24px}
.stamp{position:absolute;top:64px;right:76px;z-index:3;transform:rotate(6deg);
  background:#c8e64c;color:#14230d;padding:14px 20px;text-align:center;
  font-family:'Archivo';font-weight:900;text-transform:uppercase;font-size:24px;line-height:1.1}
.stamp small{display:block;font-family:'Space Mono';font-size:11px;letter-spacing:.08em;color:rgba(20,35,13,.75)}
</style>
</head>
<body>
<div class="wave w1"></div>
<div class="wave w2"></div>
<div class="glow"></div>
<div class="stamp"><small>Auditório de 100 lugares</small>restam 47</div>
<div class="inner">
  <div class="brand">1 + 2 de agosto · Alphaville-SP · 08h às 18h</div>
  <h1>Novarys<br><span class="lt">Creator</span> Summit</h1>
  <div class="meta">2 dias · 48 horas · R$ 97 com 2 convidados</div>
</div>
</body>
</html>
